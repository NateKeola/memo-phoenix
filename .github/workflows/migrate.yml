name: Migrate dev database

# Applies pending Supabase migrations to the DEV project on merge to main.
#
# Required GitHub Actions secrets (set these BEFORE merging PR0, or the first run
# fails with a harmless red X since the DB is already migrated by the bootstrap
# `supabase db push`):
#   SUPABASE_ACCESS_TOKEN  - Supabase personal access token for the CLI
#   SUPABASE_DB_PASSWORD   - database password, consumed by `db push`
#   SUPABASE_PROJECT_REF   - azlobwtiptvarfeukzcv
#
# `supabase db push` is idempotent against the remote schema_migrations history.
#
# Forward note (do NOT build now): if this workflow is ever pointed at a
# PRODUCTION project, gate it behind a GitHub Environment with required approval.
# The dev project keeps auto-applying.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'

concurrency:
  group: supabase-migrate-dev
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: 2.106.0
      - name: Link project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
      - name: Apply migrations
        run: supabase db push
