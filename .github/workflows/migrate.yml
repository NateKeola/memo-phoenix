name: Migrate dev database

# Applies pending Supabase migrations to the DEV project on merge to main, then
# verifies the remote actually has them (so a silent no-op push cannot ship code
# against a database missing its migration).
#
# REQUIRED GitHub Actions secrets (Settings -> Secrets and variables -> Actions ->
# New repository secret). Without all three this workflow fails loudly in the
# preflight step below, naming what is missing:
#   SUPABASE_ACCESS_TOKEN  - a Supabase personal access token (account -> Access Tokens)
#   SUPABASE_DB_PASSWORD   - the dev database password (Project Settings -> Database)
#   SUPABASE_PROJECT_REF   - azlobwtiptvarfeukzcv
#
# See docs/MIGRATIONS.md for the full checklist and a CLI-independent fallback
# (npm run db:status / npm run db:apply) for when the CLI cannot connect.
#
# Forward note (do NOT build now): if this workflow is ever pointed at a PRODUCTION
# project, gate it behind a GitHub Environment with required approval. The dev
# project keeps auto-applying.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch: {}

concurrency:
  group: supabase-migrate-dev
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      # Fail early and clearly if a secret is missing, instead of a cryptic CLI error.
      - name: Preflight - required secrets are set
        run: |
          missing=""
          [ -n "$SUPABASE_ACCESS_TOKEN" ] || missing="$missing SUPABASE_ACCESS_TOKEN"
          [ -n "$SUPABASE_DB_PASSWORD" ] || missing="$missing SUPABASE_DB_PASSWORD"
          [ -n "$SUPABASE_PROJECT_REF" ] || missing="$missing SUPABASE_PROJECT_REF"
          if [ -n "$missing" ]; then
            echo "::error::Missing required GitHub Actions secret(s):$missing"
            echo "Set them under Settings -> Secrets and variables -> Actions. See docs/MIGRATIONS.md."
            exit 1
          fi
          echo "All required secrets are present."

      - uses: supabase/setup-cli@v1
        with:
          version: 2.106.0

      - name: Supabase CLI version
        run: supabase --version

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Apply migrations (idempotent against schema_migrations)
        run: supabase db push --password "$SUPABASE_DB_PASSWORD"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Guard: confirm the push actually applied everything. db.mjs uses the
      # Management API (no DB password, no pg driver) and exits non-zero, naming any
      # migration still pending, so a silent no-op push turns into a red X.
      - name: Verify all migrations are applied on the remote
        run: node scripts/db.mjs status --check
